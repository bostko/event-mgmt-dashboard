<main class="page">
  <a [routerLink]="['/environments', environmentId]" class="back-link">&larr; Back to <strong>{{environment()?.name}}</strong> Environment</a>
  <h1>Create Service</h1>
  <form class="form" (ngSubmit)="submit()">
    <label for="svc-name">Name</label>
    <input id="svc-name" type="text" [(ngModel)]="name" name="name" required autofocus />

    <label for="svc-owner">Owner</label>
    <input id="svc-owner" type="text" [(ngModel)]="owner" name="owner" required />

    <label for="svc-env-name">Environment</label>
    <input id="svc-env" type="hidden" [(ngModel)]="environmentId" name="environmentId" required>
    <strong>{{environment()?.name}}</strong>

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }
    <div class="actions">
      <a [routerLink]="['/environments', environmentId]" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary" [disabled]="submitting() || !name.trim() || !owner.trim() || !environmentId">
        {{ submitting() ? 'Creating...' : 'Create' }}
      </button>
    </div>
  </form>
</main>
