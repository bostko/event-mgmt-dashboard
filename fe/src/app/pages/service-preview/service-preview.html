<main class="page">
  <h1>Service Preview</h1>

  @if (service() === null) {
    <p>Loading...</p>
  } @else {
    <a routerLink="/environments/{{service()!.environmentId}}" class="back-link">&larr; Manage Services</a>
    <dl class="details">
      <dt>ID</dt>
      <dd>{{ service()!.id }}</dd>
      <dt>Name</dt>
      <dd>{{ service()!.name }}</dd>
      <dt>Owner</dt>
      <dd>{{ service()!.owner }}</dd>
      <dt>Environment</dt>
      <dd>{{ service()!.environmentId }}</dd>
    </dl>
    <div class="actions">
      <a [routerLink]="['/services', service()!.id, 'edit']" class="btn-secondary">Edit</a>
      <a [routerLink]="['/services', service()!.id, 'delete']" class="btn-danger">Delete</a>
    </div>
  }
</main>
