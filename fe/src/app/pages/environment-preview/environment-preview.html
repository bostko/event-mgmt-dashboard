<main class="page">
  <a routerLink="/" class="back-link">&larr; Manage Environments</a>

  @if (environment() === null) {
    <p>Loading...</p>
  } @else {
    <dl class="details">
      <dt>ID</dt>
      <dd>{{ environment()!.id }}</dd>
      <dt>Name</dt>
      <dd>{{ environment()!.name }}</dd>
    </dl>
    <div class="actions">
      <a [routerLink]="['/services/create']" [queryParams]="{ environmentId: environment()!.id }" class="btn-primary">Create Service</a>
      <a [routerLink]="['/environments', environment()!.id, 'edit']" class="btn-secondary">Edit</a>
      <a [routerLink]="['/environments', environment()!.id, 'delete']" class="btn-danger">Delete</a>
    </div>

    <app-manage-services [environmentId]="environment()!.id" />
  }
</main>
