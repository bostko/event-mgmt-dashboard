<main class="page">
  <a routerLink="/environments" class="back-link">&larr; Manage Environments</a>
  <h1>Environment Preview</h1>

  @if (environment() === null) {
    <p>Loading...</p>
  } @else {
    <dl class="details">
      <dt>ID</dt>
      <dd>{{ environment()!.id }}</dd>
      <dt>Name</dt>
      <dd>{{ environment()!.name }}</dd>
    </dl>
    <div class="actions">
      <a [routerLink]="['/environments', environment()!.id, 'edit']" class="btn-secondary">Edit</a>
      <a [routerLink]="['/environments', environment()!.id, 'delete']" class="btn-danger">Delete</a>
    </div>
  }
</main>
